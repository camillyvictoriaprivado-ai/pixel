<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <title>Sobre mim</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0f;
      color: #00ffcc;
      font-family: 'Press Start 2P', cursive;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* 🌐 GRID CYBER */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(#00ffcc10 1px, transparent 1px),
        linear-gradient(90deg, #00ffcc10 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
    }

    /* 📺 SCANLINES */
    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        #00000030 3px
      );
      pointer-events: none;
    }

    /* 📦 BOX CENTRAL */
    .box {
      position: relative;
      z-index: 2;
      border: 2px solid #00ffcc;
      padding: 25px;
      max-width: 700px;
      background: #0b0b0fcc;
      box-shadow: 0 0 20px #00ffcc22;
    }

    h1 {
      font-size: 16px;
      text-shadow: 0 0 10px #00ffcc;
      margin-bottom: 20px;
    }

    button {
      margin: 8px;
      padding: 10px 14px;
      font-size: 9px;
      font-family: inherit;
      color: #00ffcc;
      background: transparent;
      border: 2px solid #00ffcc;
      cursor: pointer;
      transition: 0.2s;
      width: 220px;
    }

    button:hover {
      background: #00ffcc;
      color: #0b0b0f;
      box-shadow: 0 0 15px #00ffcc;
    }

    p {
      margin-top: 20px;
      font-size: 9px;
      color: #ff3df2;
      text-shadow: 0 0 8px #ff3df2;
      line-height: 1.8;
    }

    .hint {
      font-size: 8px;
      color: #00ffcc99;
      margin-top: 10px;
    }

  </style>
</head>

<body>

  <div class="box">

    <h1>SOBRE MIM 👾</h1>

    <button onclick="goWork()">💼 WHAT I DO</button>
    <button onclick="goStudy()">📚 STUDIES</button>
    <button onclick="voltarMenu()">🏠 BACK TO MENU</button>

    <p id="message">
      Selecione uma opção para acessar informações do sistema.
    </p>

    <div class="hint">
      // system ready...
    </div>

  </div>

  <script>
    function goWork() {
      window.location.href = "work.html";
    }

    function goStudy() {
      window.location.href = "studies.html";
    }

    function voltarMenu() {
      window.location.href = "index.html";
    }
  </script>

</body>

</html>

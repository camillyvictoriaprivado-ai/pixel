<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <title>Studies</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0b0b0f;
      color: #00ffcc;
      font-family: 'Press Start 2P', cursive;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
    }

    body::before {
      background-image:
        linear-gradient(#00ffcc10 1px, transparent 1px),
        linear-gradient(90deg, #00ffcc10 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
    }

    body::after {
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        #00000030 3px
      );
    }

    .box {
      position: relative;
      z-index: 2;
      border: 2px solid #00ffcc;
      padding: 25px;
      max-width: 800px;
      background: #0b0b0fcc;
    }

    h1 {
      font-size: 16px;
      text-shadow: 0 0 10px #00ffcc;
      margin-bottom: 15px;
    }

    p {
      font-size: 9px;
      color: #ff3df2;
      margin-bottom: 10px;
      line-height: 1.8;
    }

    ul {
      list-style: none;
      font-size: 9px;
      color: #00ffcc;
    }

    li { margin: 6px 0; }

    button {
      margin-top: 20px;
      padding: 10px;
      border: 2px solid #00ffcc;
      background: transparent;
      color: #00ffcc;
      cursor: pointer;
      font-size: 9px;
    }

    button:hover {
      background: #00ffcc;
      color: #0b0b0f;
    }
  </style>
</head>

<body>

  <div class="box">

    <h1>STUDIES 📚</h1>

    <p>Evoluindo na área de tecnologia e dados.</p>

    <ul>
      <li>💻 JavaScript</li>
      <li>🌐 Front-end</li>
      <li>⚙️ Lógica de programação</li>
      <li>📊 Dados e KPIs</li>
      <li>📈 Dashboards</li>
    </ul>

    <button onclick="window.location.href='index.html'">⟵ BACK</button>

  </div>

</body>

</html>

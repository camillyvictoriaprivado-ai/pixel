<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <title>Get to know me</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0b0b0f;
      color: #00ffcc;
      font-family: 'Press Start 2P', cursive;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* 🌐 GRID CYBER DE FUNDO */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(#00ffcc10 1px, transparent 1px),
        linear-gradient(90deg, #00ffcc10 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
    }

    /* 📺 SCANLINES (efeito tela antiga) */
    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        #00000030 3px
      );
      pointer-events: none;
    }

    /* 📦 CONTAINER CENTRAL */
    .box {
      position: relative;
      z-index: 2;
      border: 2px solid #00ffcc;
      padding: 30px;
      box-shadow: 0 0 20px #00ffcc33;
      background: #0b0b0fdd;
    }

    h1 {
      font-size: 18px;
      text-shadow: 0 0 10px #00ffcc;
      margin-bottom: 20px;
      animation: glitch 2s infinite;
    }

    /* 🎮 BOTÕES STYLE */
    button {
      margin-top: 12px;
      padding: 10px 14px;
      font-size: 10px;
      font-family: inherit;
      color: #00ffcc;
      background: transparent;
      border: 2px solid #00ffcc;
      cursor: pointer;
      transition: 0.2s;
      display: block;
      width: 220px;
      margin-left: auto;
      margin-right: auto;
    }

    button:hover {
      background: #00ffcc;
      color: #0b0b0f;
      box-shadow: 0 0 15px #00ffcc;
    }

    p {
      margin-top: 20px;
      font-size: 10px;
      color: #ff3df2;
      text-shadow: 0 0 8px #ff3df2;
    }

    /* ⚡ GLITCH EFFECT */
    @keyframes glitch {
      0% { text-shadow: 2px 0 #00ffcc, -2px 0 #ff3df2; }
      25% { text-shadow: -2px 0 #00ffcc, 2px 0 #ff3df2; }
      50% { text-shadow: 2px 2px #00ffcc, -2px -2px #ff3df2; }
      75% { text-shadow: -2px 2px #00ffcc, 2px -2px #ff3df2; }
      100% { text-shadow: 2px 0 #00ffcc, -2px 0 #ff3df2; }
    }

  </style>
</head>

<body>

  <div class="box">

    <h1>GET TO KNOW ME</h1>

    <button onclick="goToPage()">▶ START</button>
    <button onclick="noAction()">✖ EXIT</button>

    <p id="message"></p>

  </div>

  <script>
    function goToPage() {
      window.location.href = "what-i-do.html";
    }

    function noAction() {
      document.getElementById("message").textContent =
        "connection refused... 😅";
    }
  </script>

</body>

</html>
